name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  images:
    runs-on: ubuntu-24.04
    outputs:
      app_digest: ${{ steps.app.outputs.digest }}
      backup_digest: ${{ steps.backup.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: app
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          provenance: mode=max
          sbom: true
      - id: backup
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backup/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-backup:${{ github.ref_name }}
          provenance: mode=max
          sbom: true

  cli:
    strategy:
      matrix:
        include:
          - { target: bun-linux-x64, os_name: linux, arch: amd64 }
          - { target: bun-linux-arm64, os_name: linux, arch: arm64 }
          - { target: bun-darwin-x64, os_name: darwin, arch: amd64 }
          - { target: bun-darwin-arm64, os_name: darwin, arch: arm64 }
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - run: bun install --frozen-lockfile
      - run: bun build apps/cli/src/main.ts --compile --target=${{ matrix.target }} --outfile context-use
      - name: Smoke-test release version
        if: matrix.target == 'bun-linux-x64'
        run: test "$(./context-use version)" = "${GITHUB_REF_NAME}"
      - run: tar -czf context-use-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz context-use
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: context-use-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os_name }}-${{ matrix.arch }}
          path: context-use-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz

  publish:
    needs: [images, cli]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true
      - name: Build deployment bundle and manifest
        env:
          TAG: ${{ github.ref_name }}
          APP_DIGEST: ${{ needs.images.outputs.app_digest }}
          BACKUP_DIGEST: ${{ needs.images.outputs.backup_digest }}
        run: |
          tar -czf "artifacts/context-use-deployment-${TAG}.tar.gz" infra deploy
          bundle_sha="$(sha256sum "artifacts/context-use-deployment-${TAG}.tar.gz" | cut -d' ' -f1)"
          jq -n \
            --arg version "$TAG" \
            --arg bundle_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/context-use-deployment-${TAG}.tar.gz" \
            --arg bundle_sha "$bundle_sha" \
            --arg app "ghcr.io/${GITHUB_REPOSITORY}@${APP_DIGEST}" \
            --arg backup "ghcr.io/${GITHUB_REPOSITORY}-backup@${BACKUP_DIGEST}" \
            '{version:$version,terraform:{minimum:"1.11.0",maximum_exclusive:"2.0.0"},deployment_bundle:{url:$bundle_url,sha256:$bundle_sha},images:{app:$app,backup:$backup}}' \
            > artifacts/release-manifest.json
          cp scripts/install.sh artifacts/install.sh
          (cd artifacts && sha256sum context-use-*.tar.gz release-manifest.json install.sh > SHA256SUMS)
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/context-use-deployment-${{ github.ref_name }}.tar.gz
            artifacts/release-manifest.json
            artifacts/install.sh
      - name: Publish GitHub release
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: gh release create "${GITHUB_REF_NAME}" artifacts/* --verify-tag --generate-notes --title "context-use ${GITHUB_REF_NAME}"
