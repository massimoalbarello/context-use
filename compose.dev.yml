name: context-use-dev

x-code-service: &code-service
  build:
    context: .
    dockerfile: Dockerfile.dev
  working_dir: /app
  volumes:
    - .:/app
    - dependencies:/app/node_modules

x-role-passwords: &role-passwords
  DB_AUTH_PASSWORD: development-only
  DB_DASHBOARD_PASSWORD: development-only
  DB_MCP_PASSWORD: development-only
  DB_PUBLIC_PASSWORD: development-only
  DB_PUBLIC_MCP_PASSWORD: development-only
  DB_PUBLISHER_PASSWORD: development-only
  DB_BACKUP_PASSWORD: development-only

services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_DB: context_use
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d context_use"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    <<: *code-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *role-passwords
      MIGRATOR_DATABASE_URL: postgres://postgres:postgres@postgres:5432/context_use
    command: ["bun", "run", "db:migrate"]
    restart: "no"

  server:
    <<: *code-service
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: "3000"
      APP_ORIGIN: http://localhost:5173
      ASSET_ORIGIN: http://localhost:5173
      OAUTH_ISSUER: http://localhost:5173
      MCP_RESOURCE: http://localhost:5173/mcp
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: context-use
      OWNER_EMAIL: ${OWNER_EMAIL:-you@example.com}
      OWNER_SETUP_TOKEN_HASH: 0c3f0f8b90068b05d8039bf05db2da4742c31a23e51cfa864a96a0efe17b1694
      BETTER_AUTH_SECRET: development-only-secret-that-is-long-enough
      DATABASE_URL: postgres://context_use_dashboard:development-only@postgres:5432/context_use
      AUTH_DATABASE_URL: postgres://context_use_auth:development-only@postgres:5432/context_use
      MCP_DATABASE_URL: postgres://context_use_mcp:development-only@postgres:5432/context_use
      PUBLIC_DATABASE_URL: postgres://context_use_public:development-only@postgres:5432/context_use
      PUBLISHER_DATABASE_URL: postgres://context_use_publisher:development-only@postgres:5432/context_use
      STORAGE_DRIVER: filesystem
      STORAGE_PATH: /app/data/assets
      WEB_DIST: /app/apps/web/dist
    command: ["bun", "run", "dev:server"]
    volumes:
      - .:/app
      - dependencies:/app/node_modules
      - asset-data:/app/data/assets
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://localhost:3000/api/health'); if (!response.ok) process.exit(1)"]
      interval: 2s
      timeout: 3s
      retries: 30

  public-mcp:
    <<: *code-service
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: "3001"
      PUBLIC_MCP_ENDPOINT: http://localhost:5173/public/mcp
      PUBLIC_SITE_ORIGIN: http://localhost:5173
      PUBLIC_MCP_DATABASE_URL: postgres://context_use_public_mcp:development-only@postgres:5432/context_use
    command: ["bun", "--cwd", "apps/public-mcp", "dev"]
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://localhost:3001/health'); if (!response.ok) process.exit(1)"]
      interval: 2s
      timeout: 3s
      retries: 30

  web:
    <<: *code-service
    depends_on:
      server:
        condition: service_healthy
      public-mcp:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://server:3000
      VITE_PUBLIC_MCP_PROXY_TARGET: http://public-mcp:3001
    command: ["bun", "--cwd", "apps/web", "dev", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres-data:
  dependencies:
  asset-data:
