name: context-use-local

x-database-passwords: &database-passwords
  DB_AUTH_PASSWORD: development-only
  DB_DASHBOARD_PASSWORD: development-only
  DB_MCP_PASSWORD: development-only
  DB_PUBLIC_PASSWORD: development-only
  DB_PUBLISHER_PASSWORD: development-only
  DB_BACKUP_PASSWORD: development-only

x-app-image: &app-image
  image: context-use-local:dev
  build:
    context: .

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: context_use
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d context_use"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    <<: *app-image
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *database-passwords
      MIGRATOR_DATABASE_URL: postgres://postgres:postgres@postgres:5432/context_use
    command: ["bun", "packages/database/src/migrate.ts"]
    restart: "no"

  app:
    <<: *app-image
    user: root
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: "3000"
      APP_ORIGIN: http://localhost:3000
      ASSET_ORIGIN: http://localhost:3000
      OAUTH_ISSUER: http://localhost:3000
      MCP_RESOURCE: http://localhost:3000/mcp
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: context-use
      OWNER_EMAIL: you@example.com
      OWNER_SETUP_TOKEN_HASH: 0c3f0f8b90068b05d8039bf05db2da4742c31a23e51cfa864a96a0efe17b1694
      BETTER_AUTH_SECRET: development-only-secret-that-is-long-enough
      DATABASE_URL: postgres://context_use_dashboard:development-only@postgres:5432/context_use
      AUTH_DATABASE_URL: postgres://context_use_auth:development-only@postgres:5432/context_use
      MCP_DATABASE_URL: postgres://context_use_mcp:development-only@postgres:5432/context_use
      PUBLIC_DATABASE_URL: postgres://context_use_public:development-only@postgres:5432/context_use
      PUBLISHER_DATABASE_URL: postgres://context_use_publisher:development-only@postgres:5432/context_use
      STORAGE_DRIVER: filesystem
      STORAGE_PATH: /data/assets
      WEB_DIST: /app/apps/web/dist
    ports:
      - "3000:3000"
    volumes:
      - asset_data:/data/assets

volumes:
  postgres_data:
  asset_data:
